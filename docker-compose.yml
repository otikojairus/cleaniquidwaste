services:
  cleanliquidwaste:
    build:
      context: .
      dockerfile: Dockerfile
    image: cleanliquidwaste:latest
    container_name: cleanliquidwaste
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: http://localhost:${HOST_PORT:-3001}
